site_name: The X Programming Language
site_description: A self-hosting, statically-typed, natively-compiled language with first-class DI.
docs_dir: docs
repo_url: https://github.com/code-by-sia/x
repo_name: code-by-sia/x
# Optional MkDocs site config. The pages in docs/ also read fine as plain
# Markdown without any tooling. The site uses the Material theme.
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - CLI & REPL: cli.md
  - Language guide: language-guide.md
  - Multi-file projects: multi-file.md
  - Error handling: error-handling.md
  - Decision tables (DxT): decisions.md
  - Standard library: stdlib.md
  - How it works (self-hosting): internals.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      # X has no Pygments lexer yet; approximate ```x blocks with TypeScript
      # (shares type/interface/class/let/import/export/namespace), like GitHub.
      extend_pygments_lang:
        - name: x
          lang: typescript
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
