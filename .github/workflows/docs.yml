name: Docs

# Build the MkDocs site from docs/ and publish it to GitHub Pages.
# Requires Pages to be enabled for the repo with "Source: GitHub Actions"
# (Settings -> Pages). MkDocs is documentation tooling only — the language and
# compiler have no Python dependency.

on:
  push:
    branches: [main]
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Pages must be enabled once by hand (Settings -> Pages -> Source:
        # "GitHub Actions"); the Actions token can't create the site itself.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs Material
        run: pip install --quiet mkdocs-material
      - name: Build site
        run: mkdocs build --strict --site-dir _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
