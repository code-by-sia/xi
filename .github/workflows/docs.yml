name: Docs

# Build the Docusaurus site (in website/, sourcing the Markdown in docs/) and
# publish it to GitHub Pages. Requires Pages enabled with "Source: GitHub
# Actions". Docusaurus is documentation tooling only — the language and compiler
# have no Node dependency.

on:
  push:
    branches: [main]
    # Rebuild on docs/site changes AND on the version source (the navbar badge
    # reads xcVersion() from driver.xi at build time), so a release bump shows.
    paths: ["docs/**", "website/**", ".github/workflows/docs.yml", "compiler/impl/driver/driver.xi"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
