name: Release

# Build and publish the X toolchain (compiler `xc` + REPL `x`) for several
# targets. Pushing a version tag (e.g. v0.1.0) creates a GitHub Release with a
# tarball per platform. Manual runs (workflow_dispatch) just upload artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Guard: the checked-in bootstrap seed must be exactly what the compiler emits
  # for compiler/xc.x. bootstrap.sh refreshes xc.stage0.c in place, so any drift
  # shows up as a diff. Codegen is platform-independent, so one runner suffices.
  seed-check:
    name: stage0 seed in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap (refreshes compiler/xc.stage0.c)
        run: ./compiler/bootstrap.sh
      - name: Verify committed seed matches generated seed
        run: |
          if ! git diff --exit-code -- compiler/xc.stage0.c; then
            echo "::error::compiler/xc.stage0.c is out of sync with compiler/xc.x — run ./compiler/bootstrap.sh and commit the result"
            exit 1
          fi

  build:
    name: ${{ matrix.target }}
    needs: seed-check
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: linux-x86_64 }
          - { runner: ubuntu-24.04-arm, target: linux-arm64 }
          - { runner: macos-13,         target: macos-x86_64 }
          - { runner: macos-14,         target: macos-arm64 }

    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain (bootstrap from source)
        run: ./compiler/bootstrap.sh

      - name: Verify self-hosting fixpoint
        run: ./compiler/selfhost.sh

      - name: Package
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          DIST="x-${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST/bin" "$DIST/libexec"

          # native binaries
          cp compiler/xc "$DIST/libexec/xc"
          cp bin/x       "$DIST/libexec/x"

          # the compiler shells out to cc, so it needs the runtime + stdlib
          cp -R runtime "$DIST/runtime"
          cp -R std     "$DIST/std"

          # wrappers that locate the bundle and set the env vars
          cat > "$DIST/bin/xc" <<'SH'
          #!/bin/sh
          HERE="$(cd "$(dirname "$0")/.." && pwd)"
          export XC_RUNTIME="${XC_RUNTIME:-$HERE/runtime}"
          export XC_STD="${XC_STD:-$HERE}"
          exec "$HERE/libexec/xc" "$@"
          SH
          cat > "$DIST/bin/x" <<'SH'
          #!/bin/sh
          HERE="$(cd "$(dirname "$0")/.." && pwd)"
          export XC_RUNTIME="${XC_RUNTIME:-$HERE/runtime}"
          export XC_STD="${XC_STD:-$HERE}"
          export XC="${XC:-$HERE/bin/xc}"
          exec "$HERE/libexec/x" "$@"
          SH
          chmod +x "$DIST/bin/xc" "$DIST/bin/x"

          cat > "$DIST/README.txt" <<EOF
          X toolchain ${VERSION} (${{ matrix.target }})

          Contents:
            bin/xc   - the X compiler (wrapper; sets XC_RUNTIME and XC_STD)
            bin/x    - the X REPL / run tool
            runtime/ - C runtime (xc invokes cc with this)
            std/     - standard library (import "std/...")

          Install: put bin/ on your PATH, e.g.
            export PATH="\$PWD/$DIST/bin:\$PATH"
            xc myprog.x        # -> build/myprog
            x                  # interactive REPL

          Requires a C compiler (cc / clang / gcc) on PATH.
          EOF

          tar -czf "$DIST.tar.gz" "$DIST"
          echo "artifact=$DIST.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Smoke-test packaged bundle
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          DIST="x-${VERSION}-${{ matrix.target }}"
          tar -xzf "$DIST.tar.gz" -C "$RUNNER_TEMP"
          BUNDLE="$RUNNER_TEMP/$DIST"

          # compile-and-run via the wrapper (exercises XC_RUNTIME/XC_STD + cc)
          cat > "$RUNNER_TEMP/smoke.x" <<'EOF'
          async entry main(args: String[]) -> Integer {
              system.stdout.writeln("smoke ok")
              return 0
          }
          EOF
          XC_OUT="$RUNNER_TEMP/out" "$BUNDLE/bin/xc" "$RUNNER_TEMP/smoke.x"
          got="$("$RUNNER_TEMP/out/smoke")"
          test "$got" = "smoke ok" || { echo "::error::bundle smoke test failed: '$got'"; exit 1; }

          # REPL accepts input and evaluates
          repl="$(printf 'system.stdout.writeln("repl ok")\n' | "$BUNDLE/bin/x")"
          echo "$repl" | grep -q "repl ok" || { echo "::error::bundle REPL smoke test failed"; exit 1; }
          echo "bundle smoke test passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}
          fail_on_unmatched_files: true
          generate_release_notes: true
